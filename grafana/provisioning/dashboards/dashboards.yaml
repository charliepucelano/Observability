apiVersion: 1
providers:
  - name: 'homelab-dashboards'
    orgId: 1
    folder: 'Homelab'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
