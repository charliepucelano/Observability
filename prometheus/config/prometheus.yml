global:
  scrape_interval: 15s
  evaluation_interval: 15s

remote_write:
  - url: http://victoriametrics:8428/api/v1/write

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:

  # Windows host metrics via Windows Exporter
  - job_name: "windows_host"
    static_configs:
      - targets: ["host.docker.internal:9182"]
        labels:
          instance: "geekom-a9"

  # Pushgateway — receives AIDA64 sensor pushes
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Docker container metrics (via cAdvisor)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # Node Exporter - Linux/container host metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "geekom-a9"

  # Blackbox Exporter - Uptime/HTTP monitoring
  - job_name: "uptime"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - viaje.leyforge.com
          - camperplan.leyforge.com
          - memorias.leyforge.com
          - immich.leyforge.com
          - paperless.leyforge.com
          - music.leyforge.com
          - grafana.leyforge.com
          - chat.leyforge.com
    relabel_configs:
      - source_labels: [__address__]
        regex: 'viaje\.leyforge\.com'
        target_label: __param_target
        replacement: 'http://host.docker.internal:4173'
      - source_labels: [__address__]
        regex: 'camperplan\.leyforge\.com'
        target_label: __param_target
        replacement: 'http://host.docker.internal:5174'
      - source_labels: [__address__]
        regex: 'memorias\.leyforge\.com'
        target_label: __param_target
        replacement: 'http://host.docker.internal:3001'
      - source_labels: [__address__]
        regex: 'immich\.leyforge\.com'
        target_label: __param_target
        replacement: 'http://host.docker.internal:2283'
      - source_labels: [__address__]
        regex: 'paperless\.leyforge\.com'
        target_label: __param_target
        replacement: 'http://host.docker.internal:8000/accounts/login/?next=/'
      - source_labels: [__address__]
        regex: 'paperless\.leyforge\.com'
        target_label: __param_module
        replacement: 'http_paperless'
      - source_labels: [__address__]
        regex: 'music\.leyforge\.com'
        target_label: __param_target
        replacement: 'http://host.docker.internal:4533/app/'
      - source_labels: [__address__]
        regex: 'grafana\.leyforge\.com'
        target_label: __param_target
        replacement: 'http://host.docker.internal:3010/login'
      - source_labels: [__address__]
        regex: 'chat\.leyforge\.com'
        target_label: __param_target
        replacement: 'http://host.docker.internal:11000/auth'
      - source_labels: [__address__]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # Speedtest Exporter
  - job_name: "speedtest"
    scrape_interval: 35m
    scrape_timeout: 60s
    static_configs:
      - targets: ["speedtest:9798"]
